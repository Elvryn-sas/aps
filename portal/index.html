<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Login — APS Result Portal</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
/* ===== LOGIN ANIMATIONS ===== */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes logoPulse {
  0%, 100% { transform: scale(1) rotate(0deg); filter: drop-shadow(0 4px 16px rgba(47,122,79,0.25)); }
  50%       { transform: scale(1.04) rotate(1deg); filter: drop-shadow(0 8px 24px rgba(47,122,79,0.45)); }
}
@keyframes shimmerBg {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes floatOrb {
  0%, 100% { transform: translateY(0) scale(1); }
  50%      { transform: translateY(-22px) scale(1.06); }
}
@keyframes inputFocusGlow {
  from { box-shadow: 0 0 0 0 rgba(47,122,79,0.3); }
  to   { box-shadow: 0 0 0 6px rgba(47,122,79,0); }
}

/* ===== ANIMATED BACKGROUND ===== */
.login-wrap {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: radial-gradient(circle at top left, rgba(139,195,74,0.18), transparent 36%),
              radial-gradient(circle at bottom right, rgba(47,122,79,0.12), transparent 28%),
              var(--bg);
  position: relative; overflow: hidden;
}
.login-wrap::before, .login-wrap::after {
  content: ''; position: absolute; border-radius: 50%; pointer-events: none; z-index: 0;
  animation: floatOrb 7s ease-in-out infinite;
}
.login-wrap::before {
  width: 380px; height: 380px; top: -100px; left: -100px;
  background: radial-gradient(circle, rgba(139,195,74,0.14) 0%, transparent 70%);
}
.login-wrap::after {
  width: 300px; height: 300px; bottom: -80px; right: -80px;
  background: radial-gradient(circle, rgba(47,122,79,0.12) 0%, transparent 70%);
  animation-delay: 3.5s;
}

/* ===== LOGIN BOX ===== */
.login-box {
  background: rgba(255,255,255,0.97); border-radius: 28px; padding: 44px 40px;
  width: 100%; max-width: 430px; position: relative; z-index: 1;
  box-shadow: 0 24px 60px rgba(47,122,79,0.14), 0 2px 8px rgba(47,122,79,0.08);
  border: 1px solid rgba(144, 195, 131, 0.4);
  animation: fadeSlideUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
}

/* ===== LOGO SECTION ===== */
.login-logo {
  text-align: center; margin-bottom: 28px;
  animation: fadeSlideUp 0.7s 0.1s cubic-bezier(0.22,1,0.36,1) both;
}
.login-logo img {
  width: 90px; height: 90px; object-fit: contain;
  animation: logoPulse 4s ease-in-out infinite;
  border-radius: 50%;
  filter: drop-shadow(0 4px 16px rgba(47,122,79,0.25));
}
.login-logo h1 {
  color: var(--text); font-size: 1.45rem; margin-top: 12px; font-weight: 800;
  letter-spacing: -0.02em;
}
.login-logo .portal-subtitle {
  color: var(--primary); font-size: 0.82rem; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase; margin-top: 2px;
}
.login-logo p { color: var(--muted); font-size: 0.88rem; margin-top: 4px; }

/* ===== TABS ANIMATION ===== */
.login-tabs {
  animation: fadeSlideUp 0.7s 0.18s cubic-bezier(0.22,1,0.36,1) both;
}
.login-tab { transition: background 0.25s, color 0.25s, transform 0.15s; }
.login-tab:hover:not(.active) { background: var(--card-strong); transform: translateY(-1px); }
.login-tab.active { background: var(--primary); color: white; }

/* ===== FORM ANIMATIONS ===== */
.login-box .form-group {
  animation: fadeSlideUp 0.65s cubic-bezier(0.22,1,0.36,1) both;
}
.login-box .form-group:nth-child(4) { animation-delay: 0.25s; }
.login-box .form-group:nth-child(5) { animation-delay: 0.33s; }
.login-box .btn-primary {
  animation: fadeSlideUp 0.65s 0.42s cubic-bezier(0.22,1,0.36,1) both;
  transition: transform 0.18s, box-shadow 0.2s, background 0.2s;
}
.login-box .btn-primary:hover:not(:disabled) {
  transform: translateY(-2px) scale(1.01);
  box-shadow: 0 12px 28px rgba(47,122,79,0.35);
}
.login-box .btn-primary:active { transform: translateY(0) scale(0.99); }
.form-group input:focus {
  animation: inputFocusGlow 0.4s ease-out;
}

/* ===== FOOTER ANIMATION ===== */
.login-footer-text {
  animation: fadeSlideUp 0.65s 0.5s cubic-bezier(0.22,1,0.36,1) both;
}

/* ===== DECORATIVE DIVIDER ===== */
.login-divider {
  height: 2px; margin: 8px 0 20px;
  background: linear-gradient(90deg, transparent, rgba(47,122,79,0.15), rgba(139,195,74,0.3), rgba(47,122,79,0.15), transparent);
  border-radius: 2px;
  animation: fadeSlideUp 0.65s 0.22s cubic-bezier(0.22,1,0.36,1) both;
}
</style>
</head>

      <label>Email</label>
      <input type="email" id="email" placeholder="Enter your email" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" id="loginBtn" onclick="doLogin()">
      Login
    </button>

    <p class="text-center text-sm text-muted mt-12 login-footer-text">
      Army Public School for International Studies
    </p>
  </div>
</div>

<script type="module">
import { login, checkAuth } from "./js/api.js";
import { SCHOOL_CONFIG } from "./config.js";

document.getElementById("schoolName").textContent = SCHOOL_CONFIG.school.campus;

// If already logged in, redirect
(async () => {
  const user = await checkAuth();
  if (user?.role === "admin")   { window.location.href = "pages/admin.html";   return; }
  if (user?.role === "teacher") { window.location.href = "pages/teacher.html"; return; }
})();

let activeRole = "admin";
window.switchTab = (role) => {
  activeRole = role;
  document.getElementById("tab-admin").classList.toggle("active",   role === "admin");
  document.getElementById("tab-teacher").classList.toggle("active", role === "teacher");
};

window.doLogin = async () => {
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const btn      = document.getElementById("loginBtn");
  const alertEl  = document.getElementById("alert");
  alertEl.style.display = "none";
  btn.innerHTML  = '<span class="spinner"></span>';
  btn.disabled   = true;
  try {
    const user = await login(email, password, activeRole);
    window.location.href = `pages/${user.role}.html`;
  } catch(e) {
    alertEl.textContent    = e.message;
    alertEl.style.display  = "block";
    btn.innerHTML = "Login";
    btn.disabled  = false;
  }
};

document.getElementById("password").addEventListener("keydown", e => {
  if (e.key === "Enter") window.doLogin();
});
</script>
</body>
</html>
