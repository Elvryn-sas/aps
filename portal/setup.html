<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>APS Portal — First-Time Setup</title>
<script src="assets/js/config.js"></script>
<style>
  body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;padding:30px;color:#222}
  .box{max-width:500px;margin:0 auto;background:white;border-radius:12px;padding:32px;box-shadow:0 4px 16px rgba(0,0,0,0.1)}
  h1{color:#1a3a6b;font-size:1.4rem;margin-bottom:4px}
  p{color:#6b7280;font-size:0.9rem;margin-bottom:20px}
  label{display:block;font-weight:600;font-size:0.85rem;margin-bottom:4px;color:#1f2937}
  input{width:100%;padding:9px 12px;border:1.5px solid #d1d5db;border-radius:7px;font-size:0.9rem;margin-bottom:12px;box-sizing:border-box}
  button{width:100%;padding:11px;background:#1a3a6b;color:white;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:8px}
  button:hover{background:#0f2447}
  .alert{padding:10px 14px;border-radius:7px;margin-top:14px;font-size:0.88rem}
  .err{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
  .ok {background:#dcfce7;color:#166534;border:1px solid #86efac}
  .step{background:#f8fafc;border:1px solid #e5e7eb;border-radius:8px;padding:14px;margin-bottom:16px}
  .step h3{color:#1a3a6b;margin:0 0 8px;font-size:0.95rem}
  .step p{margin:0;font-size:0.85rem;color:#374151}
  .badge{display:inline-block;background:#dcfce7;color:#166534;padding:2px 10px;border-radius:20px;font-size:0.8rem;font-weight:600}
</style>
</head>
<body>
<div class="box">
  <h1>APS Portal — First Time Setup</h1>
  <p>Run this <strong>once</strong> to create your admin account. Everything is stored on your PC — no Firebase needed.</p>

  <div class="step">
    <h3>✅ No external services needed</h3>
    <p>All data is saved securely on your PC. Passwords are hashed and never stored in plain text.</p>
  </div>

  <label>Admin Name</label>
  <input id="aName" placeholder="e.g. Principal Tariq" value="Admin"/>

  <label>Admin Email</label>
  <input type="email" id="aEmail" placeholder="admin@school.com"/>

  <label>Admin Password (min 6 chars)</label>
  <input type="password" id="aPassword" placeholder="Strong password"/>

  <label>Setup Key (64-character secret key)</label>
  <input type="password" id="aSetupKey" placeholder="Enter the setup key"/>

  <button onclick="doSetup()">⚙️ Create Admin Account</button>
  <div id="alert"></div>
</div>

<script>
// Ensure SCHOOL_CONFIG is on window for module scripts
if (typeof SCHOOL_CONFIG !== 'undefined') window.SCHOOL_CONFIG = SCHOOL_CONFIG;
</script>
<script type="module">
import { setupAdmin } from "./assets/js/api.js";

window.doSetup = async () => {
  const name     = document.getElementById("aName").value.trim();
  const email    = document.getElementById("aEmail").value.trim();
  const password = document.getElementById("aPassword").value;
  const setupKey = document.getElementById("aSetupKey").value.trim();
  const alertEl  = document.getElementById("alert");

  if (!name || !email || !password || !setupKey) {
    alertEl.innerHTML = "All fields are required.";
    alertEl.className = "alert err"; return;
  }
  if (password.length < 6) {
    alertEl.innerHTML = "Password must be at least 6 characters.";
    alertEl.className = "alert err"; return;
  }
  try {
    await setupAdmin(name, email, password, setupKey);
    alertEl.innerHTML = `✅ Admin created and saved on your PC! <a href="../portal/">Go to Login →</a>`;
    alertEl.className = "alert ok";
  } catch(e) {
    alertEl.innerHTML = e.message;
    alertEl.className = "alert err";
  }
};
</script>
</body>
</html>
